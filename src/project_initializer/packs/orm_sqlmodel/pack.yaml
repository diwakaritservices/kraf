name: orm_sqlmodel
dependencies:
  - python-dotenv
  - sqlmodel
  - bcrypt
  - email-validator
files:
  - source: app/db/base.py.j2
    destination: app/db/base.py
  - source: app/db/session.py.j2
    destination: app/db/session.py
  - source: app/db/models.py.j2
    destination: app/db/models.py
  - source: app/security.py.j2
    destination: app/security.py
  - source: app/schemas/user.py.j2
    destination: app/schemas/user.py
  - source: app/api/users.py.j2
    destination: app/api/users.py
requires:
  - fastapi
conflicts:
  - orm_sqlalchemy
